name: NexusRisk CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        # Install everything explicitly to be safe
        pip install fastapi uvicorn pydantic pydantic-settings stripe redis aiohttp aiosqlite structlog cachetools pytest pytest-asyncio pytest-xprocess httpx
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run Automated Tests
      env:
        # Provide the missing variables Pydantic is screaming for
        REDIS_URL: redis://localhost:6379/0
        STRIPE_SECRET_KEY: "sk_test_mock"
        STRIPE_WEBHOOK_SECRET: "whsec_mock"
        ADMIN_SECRET: "nxr_admin_mock_123"
        TEST_USER_KEY: "nxr_test_mock_123"
        GMAIL_APP_PASSWORD: "mock_password"
        GENERIC_API_KEY: "nxr_test_key_123"
      run: |
        # Run tests from the project root
        python -m pytest -p no:anchorpy -v
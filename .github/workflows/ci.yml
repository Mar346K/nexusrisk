name: NexusRisk CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # This creates a real Redis instance in the GitHub cloud environment
    services:
      redis:
        image: redis:alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install pytest pytest-asyncio pytest-xprocess httpx redis

    - name: Run Automated Tests
      env:
        # Crucial: Tells the app to look at the service container we just spun up
        REDIS_URL: redis://localhost:6379/0
        GENERIC_API_KEY: "nxr_test_key_123"
      run: |
        pytest -p no:anchorpy -v

    - name: Verify Docker Build
      run: |
        docker build -t nexusrisk-engine:test .